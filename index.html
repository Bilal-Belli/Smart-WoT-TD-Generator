<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>WoT TD Generator</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="bg-gray-900 text-gray-100 min-h-screen p-8 font-sans">
        <div class="max-w-6xl mx-auto space-y-6">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-gray-800 p-6 rounded-lg shadow-lg space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-2">Select LLM Engine</label>
                        <select id="model"
                            class="w-full bg-gray-700 p-2 rounded border border-gray-600 focus:outline-indigo-500">
                            <option value="gemini">Google Gemini 2.0 Flash</option>
                            <option value="mistral">Mistral Large</option>
                            <option value="openai">OpenAI GPT-4</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Describe your IoT Device</label>
                        <textarea id="prompt" rows="10"
                            class="w-full bg-gray-700 p-3 rounded border border-gray-600 focus:outline-indigo-500 text-sm font-mono"
                            placeholder="Example: A smart temperature sensor with WiFi connectivity. It measures temperature in Celsius, has a battery level property, and can report readings every 5 minutes. Uses HTTP protocol."></textarea>
                    </div>
                    <button id="runBtn" onclick="generate()"
                        class="w-full bg-indigo-600 hover:bg-indigo-500 py-3 rounded font-bold transition-all transform hover:scale-[1.02]">
                        Generate Valid TD
                    </button>
                </div>

                <div class="bg-gray-800 p-6 rounded-lg shadow-lg flex flex-col h-[500px]">
                    <label class="block text-sm font-medium mb-2">Execution Logs</label>
                    <div id="logs"
                        class="flex-1 bg-black p-3 rounded border border-gray-700 font-mono text-xs overflow-y-auto space-y-1 text-green-400">
                        > Waiting for input...
                    </div>
                </div>
            </div>

            <div id="outputContainer" class="hidden bg-gray-800 p-6 rounded-lg shadow-lg space-y-3">
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
                    <h2 class="text-xl font-bold text-green-400">Valid TD Generated & Saved</h2>
                </div>
                <pre id="outputCode"
                    class="bg-black p-4 rounded overflow-x-auto text-sm font-mono text-yellow-300 max-h-96 overflow-y-auto"></pre>
            </div>
        </div>

        <script>
            async function generate() {
                const btn = document.getElementById('runBtn');
                const logsDiv = document.getElementById('logs');
                const outContainer = document.getElementById('outputContainer');
                const outCode = document.getElementById('outputCode');
                const prompt = document.getElementById('prompt').value;
                const model = document.getElementById('model').value;

                if (!prompt.trim()) {
                    alert('Please describe your device first!');
                    return;
                }

                btn.disabled = true;
                btn.innerHTML = "Generating & Validating...";
                logsDiv.innerHTML = "> Starting agent loop...\n> This may take several attempts...";
                outContainer.classList.add('hidden');

                try {
                    const res = await fetch('/api/generate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ prompt, model })
                    });
                    const data = await res.json();

                    logsDiv.innerHTML = data.logs.map(log => `> ${log}`).join('\n');
                    
                    if(data.success) {
                        outContainer.classList.remove('hidden');
                        outCode.innerText = JSON.stringify(data.data, null, 2);
                        logsDiv.innerHTML += '\n\n Done! The TD has been saved to things-database.json';
                    } else {
                        logsDiv.innerHTML += `\n\n${data.message || 'Generation failed'}`;
                    }
                } catch(e) {
                    logsDiv.innerHTML += `\n\n System Error: ${e.message}`;
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = "Generate Valid TD";
                }
            }
        </script>
    </body>
</html>
