<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Smart WoT</title>
        <link rel="icon" type="image/x-icon" href="/static/img/favicon.ico">
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="bg-gray-900 text-gray-100 min-h-screen font-sans">
        <nav class="bg-gray-800 border-b border-gray-700 px-6 py-4 shadow-md sticky top-0 z-50">
            <div class="max-w-6xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
                <div class="flex items-center gap-2">
                    <span class="text-xl font-extrabold text-indigo-400 tracking-wide">Smart Things Description Generator</span>
                    <span class="bg-gray-700 text-xs text-gray-300 font-mono px-2 py-0.5 rounded">v1.0</span>
                </div>
                
                <div class="flex items-center gap-3">
                    <a href="/saved-things" class="flex items-center gap-2 bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded-md font-medium text-sm transition-all border border-gray-600 shadow-sm">
                        <svg class="w-4 h-4 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"></path>
                        </svg>
                        Things Description Directory
                    </a>
                    
                    <a href="/search-terminal" class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded-md font-medium text-sm transition-all shadow-md">
                        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 002-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                        </svg>
                        Smart Search
                    </a>
                </div>
            </div>
        </nav>

        <div class="max-w-6xl mx-auto p-5 space-y-4">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="bg-gray-800 p-6 rounded-lg shadow-lg space-y-4 lg:col-span-2">
                    <div>
                        <label class="block text-sm font-medium mb-2">Select LLM Engine</label>
                        <select id="model"
                            class="w-full bg-gray-700 p-2 rounded border border-gray-600 focus:outline-indigo-500">
                            <option value="gemini">Google Gemini 2.5 Flash</option>
                            <option value="mistral">Mistral Large LTS</option>
                            <option value="openai">OpenAI GPT-4o</option>
                            <option value="deepseek">DeepSeek</option>
                            <option value="ollama">Ollama (llama3.1)</option>
                        </select>
                    </div>

                    <hr class="border-gray-700 my-2">

                    <div>
                        <span class="block text-sm font-semibold text-indigo-400 mb-3">IoT Metadata Assistant (Optional Context)</span>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="space-y-3">
                                <div>
                                    <label class="block text-xs font-medium text-gray-400 mb-1">Brand / Manufacturer</label>
                                    <input type="text" id="assist-brand" placeholder="e.g., Philips, Sonoff" 
                                        class="w-full bg-gray-700 p-2 rounded border border-gray-600 focus:outline-indigo-500 text-sm">
                                </div>
                                <div>
                                    <label class="block text-xs font-medium text-gray-400 mb-1">Model / Version</label>
                                    <input type="text" id="assist-model" placeholder="e.g., Hue White v2, ESP32-WROOM" 
                                        class="w-full bg-gray-700 p-2 rounded border border-gray-600 focus:outline-indigo-500 text-sm">
                                </div>
                                <div>
                                    <label class="block text-xs font-medium text-gray-400 mb-1">Color / Physical Layout</label>
                                    <input type="text" id="assist-color" placeholder="e.g., White plastic casing, wall mountable" 
                                        class="w-full bg-gray-700 p-2 rounded border border-gray-600 focus:outline-indigo-500 text-sm">
                                </div>
                                <div>
                                    <label class="block text-xs font-medium text-gray-400 mb-1">How to Connect / Protocol</label>
                                    <input type="text" id="assist-conn" placeholder="e.g., HTTP REST API, MQTT broker local network, CoAP" 
                                        class="w-full bg-gray-700 p-2 rounded border border-gray-600 focus:outline-indigo-500 text-sm">
                                </div>
                            </div>

                            <div class="space-y-3 flex flex-col justify-between">
                                <div>
                                    <label class="block text-xs font-medium text-gray-400 mb-1">What does it do? (Capabilities)</label>
                                    <textarea id="assist-action" rows="3" placeholder="e.g., Measures relative room temperature and humidity, toggles relay power status" 
                                        class="w-full bg-gray-700 p-2 rounded border border-gray-600 focus:outline-indigo-500 text-sm"></textarea>
                                </div>
                                <div>
                                    <label class="block text-xs font-medium text-gray-400 mb-1">Other Details or Custom Properties</label>
                                    <textarea id="assist-other" rows="3" placeholder="e.g., Firmware version 1.4.2, reads update loops every 300 seconds" 
                                        class="w-full bg-gray-700 p-2 rounded border border-gray-600 focus:outline-indigo-500 text-sm"></textarea>
                                </div>
                            </div>
                        </div>
                    </div>

                    <hr class="border-gray-700 my-2">

                    <div>
                        <label class="block text-sm font-medium mb-2">General / Summary Description</label>
                        <textarea id="prompt" rows="4"
                            class="w-full bg-gray-700 p-3 rounded border border-gray-600 focus:outline-indigo-500 text-sm font-mono"
                            placeholder="Add any overall context here or raw description. If specific assistant fields are filled, they will combine with this text automatically."></textarea>
                    </div>

                    <button id="runBtn" onclick="generate()"
                        class="w-full bg-indigo-600 hover:bg-indigo-500 py-2.5 rounded font-bold transition-all transform hover:scale-[1.02]">
                        Generate Valid Thing Description
                    </button>
                </div>

                <div class="bg-gray-800 p-4 rounded-lg shadow-lg flex flex-col lg:col-span-1">
                    <label class="block text-sm font-medium mb-2">Execution Logs</label>
                    <div id="logs" class="flex-1 bg-black p-3 rounded border border-gray-700 font-mono text-xs overflow-y-auto space-y-1 text-green-400 min-h-[250px]">
                    </div>
                </div>
            </div>

            <div id="outputContainer" class="hidden bg-gray-800 p-6 rounded-lg shadow-lg space-y-3">
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
                    <h2 class="text-xl font-bold text-green-400">Valid Thing Description Generated & Saved</h2>
                </div>
                <pre id="outputCode"
                    class="bg-black p-4 rounded overflow-x-auto text-sm font-mono text-yellow-300 max-h-96 overflow-y-auto"></pre>
            </div>
        </div>

        <script>
            async function generate() {
                const btn = document.getElementById('runBtn');
                const logsDiv = document.getElementById('logs');
                const outContainer = document.getElementById('outputContainer');
                const outCode = document.getElementById('outputCode');
                const model = document.getElementById('model').value;

                // Extract value variables from UI fields
                const brand = document.getElementById('assist-brand').value.trim();
                const deviceModel = document.getElementById('assist-model').value.trim();
                const color = document.getElementById('assist-color').value.trim();
                const connection = document.getElementById('assist-conn').value.trim();
                const capabilities = document.getElementById('assist-action').value.trim();
                const other = document.getElementById('assist-other').value.trim();
                const generalPrompt = document.getElementById('prompt').value.trim();

                // Build a combined structured context payload
                let compiledDescription = "";
                
                if (brand) compiledDescription += `Brand/Manufacturer: ${brand}\n`;
                if (deviceModel) compiledDescription += `Model/Version: ${deviceModel}\n`;
                if (color) compiledDescription += `Physical Color/Appearance: ${color}\n`;
                if (connection) compiledDescription += `Connection Type/Protocols: ${connection}\n`;
                if (capabilities) compiledDescription += `Capabilities/Actions: ${capabilities}\n`;
                if (other) compiledDescription += `Other Technical Details: ${other}\n`;
                if (generalPrompt) compiledDescription += `General Overview: ${generalPrompt}\n`;

                // Validation safeguard: check if user provided *anything* at all
                if (!compiledDescription.trim()) {
                    alert('Please provide some information about your device via either the metadata fields or the general description!');
                    return;
                }

                btn.disabled = true;
                btn.innerHTML = "Generating & Validating ...";
                logsDiv.innerHTML = "\n> Starting agent loop ...";
                outContainer.classList.add('hidden');

                try {
                    const res = await fetch('/api/generate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        // Sending the merged details as a clean, unified 'prompt' property
                        body: JSON.stringify({ prompt: compiledDescription.trim(), model })
                    });
                    const data = await res.json();

                    logsDiv.innerHTML = data.logs.map(log => `\n> ${log}`).join('\n');
                    
                    if(data.success) {
                        outContainer.classList.remove('hidden');
                        outCode.innerText = JSON.stringify(data.data, null, 2);
                        logsDiv.innerHTML += '\n Done! The TD has been saved to things-database.json';
                    } else {
                        logsDiv.innerHTML += `\n ${data.message || 'Generation failed'}`;
                    }
                } catch(e) {
                    logsDiv.innerHTML += `\n System Error: ${e.message}`;
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = "Generate Valid TD";
                }
            }
        </script>
    </body>
</html>
